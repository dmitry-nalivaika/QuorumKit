name: Digital Twin Agent (Claude)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  digital-twin-review:
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@digital-twin-agent')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run Digital Twin Agent
        uses: anthropics/claude-code-action@28f83620103c48a57093dcc2837eec89e036bb9f # beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read your agent definition at .claude/agents/digital-twin-agent.md in full.
            Read the project constitution at .specify/memory/constitution.md.
            Review PR #${{ github.event.issue.number }} for digital twin model drift and consistency.
            Post your Digital Twin Review as a PR comment.
