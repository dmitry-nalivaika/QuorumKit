name: Compliance Agent (Copilot)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  models: read

jobs:
  compliance-review:
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@compliance-agent')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Compliance Agent
        uses: github/copilot-code-action@v1
        with:
          prompt: |
            Read your agent definition at .github/agents/compliance-agent.md in full.
            Read the project constitution at .specify/memory/constitution.md to determine which standards apply.
            Read docs/security/zones.md and docs/architecture/ ADRs if present.
            Review PR #${{ github.event.issue.number }} against only the standards defined in the constitution.
            Post your Compliance Review as a PR comment.
