name: Reviewer Agent (Copilot)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue or PR number (used when triggered by the Orchestrator)'
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  models: read

jobs:
  reviewer:
    if: |
      contains(github.event.comment.body, '@reviewer-agent') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      (github.event.issue.pull_request != null || github.event_name == 'pull_request_review_comment')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Reviewer Agent via GitHub Models
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const readSafe = p => { try { return fs.readFileSync(p, 'utf8'); } catch { return ''; } };

            const agentInstructions = readSafe('.github/agents/reviewer-agent.md') || readSafe('.apm/agents/reviewer-agent.md');
            const constitution      = readSafe('.specify/memory/constitution.md');

            const issueNumber   = context.eventName === 'workflow_dispatch'
              ? Number(context.payload.inputs.issue_number)
              : (context.payload.issue?.number ?? context.payload.pull_request?.number);
            const commentBody   = context.payload.comment?.body ?? '';
            const commentAuthor = context.payload.comment?.user?.login ?? '';

            const systemContent = [
              constitution      && `## Project Constitution\n${constitution}`,
              agentInstructions && `## Agent Instructions\n${agentInstructions}`,
            ].filter(Boolean).join('\n\n---\n\n')
              || 'You are a helpful GitHub code reviewer agent.';

            const userContent =
              `@${commentAuthor} asked you (via comment on #${issueNumber}) to review this PR.\n` +
              `Comment:\n${commentBody}`;

            const res = await fetch('https://models.inference.ai.azure.com/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model: 'gpt-4o',
                messages: [
                  { role: 'system', content: systemContent },
                  { role: 'user',   content: userContent },
                ],
                max_tokens: 2048,
              }),
            });

            if (!res.ok) {
              const txt = await res.text();
              core.setFailed(`GitHub Models API error ${res.status}: ${txt}`);
              return;
            }

            const data  = await res.json();
            const reply = data.choices?.[0]?.message?.content?.trim()
              ?? '⚠️ Reviewer agent produced no output.';

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issueNumber,
              body:         reply,
            });
