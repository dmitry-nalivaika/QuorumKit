name: Reviewer Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  reviewer:
    if: |
      contains(github.event.comment.body, '@reviewer-agent') &&
      (github.event.issue.pull_request != null || github.event_name == 'pull_request_review_comment')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read `.claude/agents/reviewer-agent.md` in full — it defines your role,
            review checklist, labelling convention, and hard constraints.
            Read `.specify/memory/constitution.md` in full.

            Your task: review PR #${{ github.event.issue.number }} and post your findings.
            Follow every step in reviewer-agent.md exactly.
          claude_args: "--max-turns 20"
