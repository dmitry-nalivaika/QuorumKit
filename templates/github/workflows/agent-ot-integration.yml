name: OT Integration Agent (Claude)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ot-integration-review:
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@ot-integration-agent')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run OT Integration Agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read your agent definition at .claude/agents/ot-integration-agent.md in full.
            Read the project constitution at .specify/memory/constitution.md.
            Read docs/security/zones.md if it exists.
            Review PR #${{ github.event.issue.number }} using your full checklist.
            Post your OT Integration Review as a PR comment.
