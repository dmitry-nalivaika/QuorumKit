name: Architect Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  architect:
    if: |
      contains(github.event.comment.body, '@architect-agent') &&
      (github.event.issue.pull_request != null ||
       github.event_name == 'pull_request_review_comment' ||
       github.event.issue.pull_request == null)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read `.claude/agents/architect-agent.md` in full — it defines your role,
            ADR format, review checklist, blocker thresholds, and hard constraints.
            Read `.specify/memory/constitution.md` in full.
            Read `docs/architecture/` (if it exists) for prior ADRs.

            Your task: perform an architectural review for issue/PR #${{ github.event.issue.number }}.
            Follow every step in architect-agent.md exactly.
          claude_args: "--max-turns 20"
