name: APM Orchestrator

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, labeled, synchronize]
  pull_request_review_comment:
    types: [created]
  workflow_run:
    # Only watch agent workflows completing — not the orchestrator itself
    workflows:
      - "Triage Agent (Copilot)"
      - "BA / Product Agent (Copilot)"
      - "Architect Agent (Copilot)"
      - "Developer Agent (Copilot)"
      - "QA/Test Agent (Copilot)"
      - "Reviewer Agent (Copilot)"
      - "Release Agent (Copilot)"
      - "Security Agent (Copilot)"
      - "Triage Agent (Claude)"
      - "BA/Product Agent (Claude)"
      - "Architect Agent (Claude)"
      - "Developer Agent (Claude)"
      - "QA/Test Agent (Claude)"
      - "Reviewer Agent (Claude)"
      - "Release Agent (Claude)"
      - "Security Agent (Claude)"
    types: [completed]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write        # needed to trigger workflow_dispatch (agent invocation)
  # Note: GET /repos/{owner}/{repo}/collaborators/{username}/permission (FR-010) is
  # covered by the GITHUB_TOKEN's default repository read access (contents: read above).

# FR-027, ADR-007 §2: serialise orchestrator runs per issue/PR. Without this,
# parallel deliveries (e.g. label spam) race on the audit channel and can
# produce two state comments for the same transition.
concurrency:
  group: apm-orchestrator-${{ github.event.issue.number || github.event.pull_request.number || github.event.workflow_run.id || 'global' }}
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # ADR-007 §6 / FR-029: never let a routing failure swallow the run silently.
    # The final step posts an `outcome: orchestrator-failure` audit comment
    # if any earlier step failed.
    continue-on-error: false
    # Don't run when triggered by a bot (prevents cascades from automated commits)
    if: ${{ github.event.sender.type != 'Bot' || github.event_name == 'workflow_run' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run APM Orchestrator
        id: run_orchestrator
        # Engine is distributed as a GitHub Action (Issue #47, ADR-047 §1).
        # Pin to a major-version tag for automatic patch + minor updates;
        # rotate to a SHA pin if your org's policy requires it (Dependabot
        # `github-actions` ecosystem opens the rotation PRs).
        uses: dmitry-nalivaika/APM/engine@v3 # apm-allow: third-party — first-party APM engine
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DASHBOARD_WEBHOOK_URL: ${{ vars.DASHBOARD_WEBHOOK_URL }}

      # FR-029, ADR-007 §6: if the orchestrator itself crashed, post a
      # canonical orchestrator-failure audit comment so the run is observable
      # instead of silently dropped. The fallback uses gh CLI because the
      # orchestrator process is the failed party.
      - name: Post orchestrator-failure audit comment
        if: steps.run_orchestrator.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "::warning::No issue/PR number on this event — cannot post orchestrator-failure"
            exit 0
          fi
          BODY=$(cat <<EOF
          **[APM Orchestrator]** ❌ Orchestrator crashed handling event \`${GITHUB_EVENT_NAME}\` — outcome \`orchestrator-failure\`. See [run logs]($RUN_URL).

          <!-- apm-pipeline-state: {"status":"failed","outcome":"orchestrator-failure","runUrl":"$RUN_URL"} -->
          EOF
          )
          gh api -X POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/issues/$ISSUE_NUMBER/comments" \
            -f body="$BODY" || true
          # Re-fail the job so the orchestrator-failure is visible in the run badge.
          exit 1

      - name: Broadcast to dashboard
        if: vars.DASHBOARD_WEBHOOK_URL != ''
        env:
          DASHBOARD_WEBHOOK_URL: ${{ vars.DASHBOARD_WEBHOOK_URL }}
          APM_WEBHOOK_SECRET: ${{ secrets.APM_WEBHOOK_SECRET }}
        run: |
          # Payload is written to /tmp/apm-pipeline-event.json by index.js when a state transition occurs
          # SEC-HIGH-001: X-APM-Webhook-Secret header authenticates the request to the dashboard server
          if [ -f /tmp/apm-pipeline-event.json ]; then
            curl -s -X POST "$DASHBOARD_WEBHOOK_URL/webhook/pipeline-event" \
              -H "Content-Type: application/json" \
              -H "X-APM-Webhook-Secret: ${APM_WEBHOOK_SECRET}" \
              -d @/tmp/apm-pipeline-event.json || echo "Dashboard broadcast failed (non-fatal)"
          fi
