name: Triage Agent

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: read
  id-token: write

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read `.claude/agents/triage-agent.md` in full — it defines your role,
            label taxonomy, triage workflow, comment format, and hard constraints.
            Read `.specify/memory/constitution.md` for project scope and principles.

            Your task: triage issue #${{ github.event.issue.number }}.
            Follow every step in triage-agent.md exactly.
          claude_args: "--max-turns 10"
