name: Docs Agent (Copilot)

on:
  push:
    branches: [main]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  models: read

jobs:
  docs:
    if: |
      github.event_name == 'push' ||
      contains(github.event.comment.body, '@docs-agent')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Docs Agent via GitHub Copilot
        uses: github/copilot-actions/ask@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read `.github/agents/docs-agent.md` in full — it defines your role,
            audit checklist, labelling convention, hard constraints, and reporting format.
            Read `.specify/memory/constitution.md` in full.

            Your task: audit documentation for the most recently merged PR or the
            PR referenced in the comment, then open a Documentation PR if any
            updates are needed.
            Follow every step in docs-agent.md exactly.
