# Bug Fix Pipeline
# Triggered after the Triage Agent has processed the issue.
# The Triage Agent (fired on issues.opened) applies both labels; the orchestrator
# picks this up once BOTH are present, guaranteeing triage always runs first.
# Chain: dev → qa → reviewer
#
# Customise this file freely — changes take effect on the next Orchestrator run.
name: bug-fix-pipeline
version: "1"

trigger:
  event: issues.labeled
  labels:
    - triaged
    - type:bugline
# Triggered when an issue is labeled type:bug (triage agent applies this label).
# The triaged label is NOT required in the trigger — GitHub fires one event per
# label added, so requiring both simultaneously is unreliable (Race Cause 2).
# Chain: dev → qa → reviewer
#
# Customise this file freely — changes take effect on the next Orchestrator run.
name: bug-fix-pipeline
version: "1"

trigger:
  event: issues.labeled
  labels:
    - type:bug

steps:
  - name: dev
    agent: dev

  - name: qa
    agent: qa

  - name: reviewer
    agent: reviewer
