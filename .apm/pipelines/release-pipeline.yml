# Release Pipeline
# Triggered when a PR is merged to main (workflow_run completed + label type:release).
# The release step requires explicit human approval before the release-agent publishes.
#
# Customise this file freely — changes take effect on the next Orchestrator run.
name: release-pipeline
version: "1"

trigger:
  event: issues.labeled
  labels:
    - triaged
    - type:release

steps:
  - name: qa
    agent: qa

  - name: security
    agent: security

  - name: reviewer
    agent: reviewer

  - name: release
    agent: release
    approval: required
    approval_timeout_hours: 72
