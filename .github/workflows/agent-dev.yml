name: Developer Agent (Claude)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue or PR number triggering this agent'
        required: true
      run_id:
        description: 'Orchestrator run id (optional)'
        required: false
        default: ''
      step:
        description: 'Pipeline step name (optional)'
        required: false
        default: 'dev'
      iteration:
        description: 'Pipeline iteration (optional)'
        required: false
        default: '1'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  dev:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Run Developer Agent (Claude runtime)
        env:
          RUNTIME_KIND: claude
          RUNTIME_NAME: claude-default
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          STEP: ${{ github.event.inputs.step }}
          ITERATION: ${{ github.event.inputs.iteration }}
        run: node .github/scripts/dev-agent-runner.cjs
