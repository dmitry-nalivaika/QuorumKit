name: Developer Agent (Claude)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue or PR number triggering this agent'
        required: true
      run_id:
        description: 'Orchestrator run id (optional)'
        required: false
        default: ''
      step:
        description: 'Pipeline step name (optional)'
        required: false
        default: 'dev'
      iteration:
        description: 'Pipeline iteration (optional)'
        required: false
        default: '1'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  dev:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Run Developer Agent (Claude runtime)
        env:
          RUNTIME_KIND: claude
          RUNTIME_NAME: claude-default
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          STEP: ${{ github.event.inputs.step }}
          ITERATION: ${{ github.event.inputs.iteration }}
        run: node .github/scripts/dev-agent-runner.cjs
