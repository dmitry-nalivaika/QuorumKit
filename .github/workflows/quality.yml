name: QuorumKit Library Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-check:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run quality gates
        run: bash installer/quality-check.sh

  pipeline-validator:
    name: Pipeline Validator (FR-020)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install orchestrator deps
        run: npm ci
        working-directory: engine/orchestrator
      - name: Validate every pipeline file under .apm/pipelines/
        run: node engine/orchestrator/pipeline-validator-cli.js .apm/pipelines # apm-allow: M8 — engine Action not yet published (#47 step 9 — pending engine/ relocation + release workflow)

  verify-mirror:
    name: Verify Mirror (ADR-006)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install orchestrator deps (for js-yaml in verify-mirror.sh)
        run: npm ci
        working-directory: engine/orchestrator
      - name: Run verify-mirror.sh
        run: bash installer/verify-mirror.sh

  orchestrator-tests:
    name: Orchestrator Tests (FR-023)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install orchestrator deps
        run: npm ci
        working-directory: engine/orchestrator
      - name: Run vitest suite
        run: npm test
        working-directory: engine/orchestrator

  regulation-lint:
    name: Regulation Lint (FR-014)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install orchestrator deps
        run: npm ci
        working-directory: engine/orchestrator
      - name: Lint pipelines against regulation document
        run: node engine/orchestrator/regulation-lint.js # apm-allow: M8 — engine Action not yet published (#47 step 9 — pending engine/ relocation + release workflow)

  markdown-links:
    name: Markdown Link Validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check markdown links
        run: |
          # Skip:
          #   • node_modules — third-party docs.
          #   • templates/seed/ — consumer-repo seed files; relative links
          #     resolve against the *consumer's* root post-install, not against
          #     the SoT path. Validating them here yields false negatives.
          find . -name "*.md" \
            -not -path "*/node_modules/*" \
            -not -path "./templates/seed/*" \
            | xargs markdown-link-check --config .markdown-link-check.json
