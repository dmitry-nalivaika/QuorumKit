name: APM Library Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-check:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run quality gates
        run: bash scripts/quality-check.sh

  markdown-links:
    name: Markdown Link Validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check markdown links
        run: |
          find . -name "*.md" \
            -not -path "*/node_modules/*" \
            | xargs markdown-link-check --config .markdown-link-check.json
