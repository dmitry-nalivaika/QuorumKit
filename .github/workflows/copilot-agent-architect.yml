name: Architect Agent (Copilot)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  models: read

jobs:
  architect:
    if: |
      contains(github.event.comment.body, '@architect-agent') &&
      (github.event.issue.pull_request != null ||
       github.event_name == 'pull_request_review_comment' ||
       github.event.issue.pull_request == null)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Architect Agent via GitHub Copilot
        uses: github/copilot-actions/ask@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read `.github/agents/architect-agent.md` in full — it defines your role,
            ADR format, review checklist, blocker thresholds, and hard constraints.
            Read `.specify/memory/constitution.md` in full.
            Read `docs/architecture/` (if it exists) for prior ADRs.

            Your task: perform an architectural review for issue/PR #${{ github.event.issue.number }}.
            Follow every step in architect-agent.md exactly.
