name: Developer Agent (Copilot)
# apm-allow-divergence: self-host uses shared .cjs agentic runner (issue #101); templates/ retains the v1 inline GitHub Models script until the runner is packaged for downstream distribution.

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue or PR number triggering this agent'
        required: true
      run_id:
        description: 'Orchestrator run id (optional)'
        required: false
        default: ''
      step:
        description: 'Pipeline step name (optional)'
        required: false
        default: 'dev'
      iteration:
        description: 'Pipeline iteration (optional)'
        required: false
        default: '1'

permissions:
  contents: write
  issues: write
  pull-requests: write
  models: read

jobs:
  dev:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Run Developer Agent (Copilot runtime)
        env:
          RUNTIME_KIND: copilot
          RUNTIME_NAME: copilot-default
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          STEP: ${{ github.event.inputs.step }}
          ITERATION: ${{ github.event.inputs.iteration }}
        run: node .github/scripts/dev-agent-runner.cjs
