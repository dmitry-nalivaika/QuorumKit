name: BA / Product Agent (Copilot)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue or PR number triggering this agent'
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: read
  models: read

jobs:
  ba:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run BA / Product Agent via GitHub Models
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const readSafe = p => { try { return fs.readFileSync(p, 'utf8'); } catch { return ''; } };

            const agentInstructions = readSafe('.github/agents/ba-product-agent.md') || readSafe('.apm/agents/ba-product-agent.md');
            const constitution      = readSafe('.specify/memory/constitution.md');

            const issueNumber = Number('${{ github.event.inputs.issue_number }}');

            let issueTitle = '';
            let issueBody  = '';
            try {
              const issue = await github.rest.issues.get({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issueNumber,
              });
              issueTitle = issue.data.title ?? '';
              issueBody  = issue.data.body  ?? '';
            } catch (e) {
              core.warning(`Could not fetch issue #${issueNumber}: ${e.message}`);
            }

            const systemContent = [
              constitution      && `## Project Constitution\n${constitution}`,
              agentInstructions && `## Agent Instructions\n${agentInstructions}`,
            ].filter(Boolean).join('\n\n---\n\n')
              || 'You are a helpful GitHub BA/product agent.';

            const userContent =
              `You are acting as the BA / Product Agent for issue #${issueNumber}.\n` +
              `Title: ${issueTitle}\n\nBody:\n${issueBody}\n\n` +
              `Analyse requirements, identify acceptance criteria, flag any ambiguities, ` +
              `and post a structured requirements summary as a comment.`;

            const res = await fetch('https://models.inference.ai.azure.com/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model: 'gpt-4o',
                messages: [
                  { role: 'system', content: systemContent },
                  { role: 'user',   content: userContent },
                ],
                max_tokens: 2048,
              }),
            });

            if (!res.ok) {
              const txt = await res.text();
              core.setFailed(`GitHub Models API error ${res.status}: ${txt}`);
              return;
            }

            const data  = await res.json();
            const reply = data.choices?.[0]?.message?.content?.trim()
              ?? '⚠️ BA agent produced no output.';

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issueNumber,
              body:         reply,
            });
