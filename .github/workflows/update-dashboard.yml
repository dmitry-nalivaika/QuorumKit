name: Update Dashboard

on:
  push:
    branches: [main]
    paths:
      - '.apm/agents/**'
      - 'apm.yml'
      - 'engine/dashboard/generate-dashboard.js'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Generate dashboard
        run: node engine/dashboard/generate-dashboard.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet engine/dashboard/index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated dashboard
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "docs-agent[bot]"
          git config user.email "docs-agent@users.noreply.github.com"
          git add engine/dashboard/index.html
          git commit -m "chore(dashboard): auto-sync agent data from .apm/agents [skip ci]"
          git push

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "✅ Dashboard is already up to date."
